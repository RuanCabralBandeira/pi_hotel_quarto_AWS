services:
  hotel-quarto:
    build: .

    container_name: hotel-quarto

    ports:
      - "9533:9533"

    restart: always

    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}
      RABBITMQ_URL: ${RABBITMQ_URL}

    command: >
      sh -c "
      npx prisma db push &&
      npm run dev
      "